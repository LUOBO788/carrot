<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot - чобчРЖхРОхП░</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root {
  --bg: #050507;
  --card: #12151d;
  --text: #e0e6ff;
  --light-text: #a0b0d0;
  --border: #252a3a;
  --blue: #00d1ff;
  --purple: #9d00ff;
  --pink: #ff00d1;
  --glow: 0 0 12px rgba(0,209,255,0.4);
}
#particles {position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1;}
body {font-family:'Segoe UI',Roboto,'Microsoft YaHei',sans-serif;background:#050507;color:var(--text);line-height:1.8;min-height:100vh;padding-bottom:40px;overflow-x:hidden;}
.gradient-text {font-weight:bold;background:linear-gradient(90deg,var(--blue),var(--purple),var(--pink));background-size:250% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;animation:flow 4s linear infinite;}
@keyframes flow {0%{background-position:0% 50%;}100%{background-position:250% 50%;}}
.nav {position:fixed;top:0;width:100%;background:rgba(10,12,18,0.85);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.05);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;z-index:999;}
.logo {font-size:20px;font-weight:bold;}
.logout-btn {padding:8px 16px;border-radius:10px;background:rgba(255,64,124,0.1);color:#ff407c;border:1px solid rgba(255,64,124,0.2);font-size:13px;cursor:pointer;display:none;}
.container {max-width:500px;margin:90px auto 0;padding:20px;}
.login-box {background:rgba(20,23,32,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:20px;padding:40px 30px;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.2);}
.login-box h2 {margin-bottom:30px;}
.login-box input {width:100%;padding:16px;margin-bottom:16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;color:var(--text);font-size:15px;outline:none;transition:0.3s;}
.login-box input:focus {border-color:var(--blue);box-shadow:var(--glow);}
.login-btn {width:100%;padding:16px;border-radius:14px;background:linear-gradient(90deg,var(--blue),var(--purple));color:#fff;font-weight:bold;border:none;cursor:pointer;transition:0.3s;box-shadow:0 6px 18px rgba(0,209,255,0.2);}
.login-btn:hover {transform:translateY(-3px);}
.admin-section {display:none;}
.section-title {margin:20px 0;text-align:center;}
.card {background:rgba(20,23,32,0.6);border:1px solid rgba(255,255,255,0.05);border-radius:18px;padding:24px;margin-bottom:20px;}
.card h3 {margin-bottom:16px;font-size:16px;}
.user-table {width:100%;border-collapse:collapse;}
.user-table th,.user-table td {padding:12px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.05);font-size:14px;}
.notice-input {width:100%;padding:16px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:14px;color:var(--text);min-height:120px;margin-bottom:16px;outline:none;resize:none;}
.save-btn {width:100%;padding:14px;border-radius:12px;background:linear-gradient(90deg,var(--blue),var(--purple));color:#fff;font-weight:bold;border:none;cursor:pointer;transition:0.3s;}
.save-btn:hover {transform:translateY(-2px);}
input.apk-input {width:100%;padding:14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);margin-bottom:12px;outline:none;}
.msg {padding:10px;border-radius:10px;margin:10px 0;text-align:center;display:none;font-size:14px;}
.msg-success {background:rgba(0,255,136,0.08);color:#00ff88;border:1px solid rgba(0,255,136,0.1);}
.msg-error {background:rgba(255,64,124,0.08);color:#ff407c;border:1px solid rgba(255,64,124,0.1);}
.current-info {background:rgba(255,255,255,0.03);border-radius:12px;padding:12px;margin-top:10px;font-size:13px;color:var(--light-text);}
.agent-input {width:100%;padding:14px;margin-bottom:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);}
.card-input {width:100%;padding:14px;margin-bottom:10px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;color:var(--text);}
.qr-preview {width:120px;height:120px;background:#222;border-radius:10px;margin:10px 0;}
.qr-preview img {width:100%;height:100%;object-fit:contain;border-radius:10px;}
</style>
</head>
<body>
<div id="particles"></div>
<div class="nav">
  <div class="logo gradient-text">ЁЯеХ Carrot чобчРЖхРОхП░</div>
  <button class="logout-btn" id="logoutBtn" onclick="adminLogout()">щААхЗ║чЩ╗х╜Х</button>
</div>
<div class="container">
  <div class="login-box" id="loginBox">
    <h2 class="gradient-text">чобчРЖхСШчЩ╗х╜Х</h2>
    <input type="text" id="adminUser" placeholder="чобчРЖхСШш┤жхП╖">
    <input type="password" id="adminPwd" placeholder="чобчРЖхСШхпЖчаБ">
    <button class="login-btn" onclick="adminLogin()">члЛхН│чЩ╗х╜Х</button>
  </div>

  <div class="admin-section" id="adminPanel">
    <h2 class="gradient-text section-title">цОзхИ╢щЭвцЭ┐</h2>

    <!-- цФ╢цм╛чаБшо╛ч╜о -->
    <div class="card">
      <h3 class="gradient-text">цФ╢цм╛чаБшо╛ч╜о</h3>
      <input class="agent-input" id="payQrInput" placeholder="цФ╢цм╛чаБхЫ╛чЙЗщУ╛цОея╝Иbase64цИЦURLя╝Й">
      <button class="save-btn" onclick="savePayQr()">ф┐ЭхнШцФ╢цм╛чаБ</button>
      <div class="qr-preview" id="qrPreview"></div>
    </div>

    <!-- хНбхпЖчобчРЖ -->
    <div class="card">
      <h3 class="gradient-text">хНбхпЖчобчРЖ</h3>
      <select class="card-input" id="cardType">
        <option value="хСихНб">хСихНб</option>
        <option value="цЬИхНб">цЬИхНб</option>
        <option value="хнгхНб">хнгхНб</option>
        <option value="ц░╕ф╣Е">ц░╕ф╣Е</option>
      </select>
      <textarea class="card-input" id="cardList" placeholder="цпПшбМф╕Аф╕кхНбхпЖя╝МцЙ╣щЗПц╖╗хКа" rows="4"></textarea>
      <button class="save-btn" onclick="addCards()">ц╖╗хКахНбхпЖ</button>
      <div id="cardCount" style="margin-top:10px;font-size:14px;color:var(--light-text);"></div>
    </div>

    <!-- ф╗гчРЖчобчРЖ -->
    <div class="card">
      <h3 class="gradient-text">ц╖╗хКаф╗гчРЖ</h3>
      <input class="agent-input" id="agentName" placeholder="ф╗гчРЖхРНчз░">
      <input class="agent-input" id="agentQQ" placeholder="ф╗гчРЖQQхП╖">
      <select class="agent-input" id="agentLevel">
        <option value="цА╗ф╗гчРЖ">цА╗ф╗гчРЖ</option>
        <option value="ф╗гчРЖ">ф╗гчРЖ</option>
      </select>
      <button class="save-btn" onclick="addAgent()">ц╖╗хКаф╗гчРЖ</button>
      <div id="agentMsg" class="msg"></div>
    </div>

    <div class="card">
      <h3 class="gradient-text">ф╗гчРЖхИЧшбия╝ИчВ╣хЗ╗хИащЩдя╝Й</h3>
      <div id="agentAdminList" style="font-size:14px;color:var(--light-text);"></div>
    </div>

    <div class="card">
      <h3 class="gradient-text">чФицИ╖хИЧшби</h3>
      <table class="user-table">
        <thead><tr><th>чФицИ╖хРН</th></tr></thead>
        <tbody id="userList"></tbody>
      </table>
    </div>

    <div class="card">
      <h3 class="gradient-text">хЕмхСКчобчРЖ</h3>
      <textarea class="notice-input" id="noticeText" placeholder="ш╛УхЕехЕмхСКхЖЕхо╣"></textarea>
      <button class="save-btn" onclick="saveNotice()">ф┐ЭхнШхЕмхСК</button>
    </div>

    <div class="card">
      <h3 class="gradient-text">APK ф╕Лш╜╜шо╛ч╜о</h3>
      <input class="apk-input" type="text" id="apkUrl" placeholder="APK ф╕Лш╜╜щУ╛цОе">
      <input class="apk-input" type="text" id="apkName" placeholder="чЙИцЬмхРНя╝ИхжВ v1.2.0я╝Й">
      <button class="save-btn" onclick="saveApk()">ф┐ЭхнШх╣╢хРМцне</button>
      <div id="apkStatus" class="msg"></div>
      <div id="currentApk" class="current-info"></div>
    </div>
  </div>
</div>

<script>
function createParticles(){
  const p=document.getElementById('particles');
  for(let i=0;i<40;i++){
    let d=document.createElement('div');
    d.style.cssText=`position:absolute;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;background:#00d1ff;border-radius:50%;top:${Math.random()*100}%;left:${Math.random()*100}%;opacity:${Math.random()*0.5+0.2};box-shadow:0 0 4px #00d1ff;animation:f ${Math.random()*5+3}s linear infinite`;
    p.appendChild(d);
  }
  let s=document.createElement('style');
  s.innerHTML='@keyframes f{0%{transform:translate(0,0);}50%{transform:translate(6px,6px);}100%{transform:translate(0,0);}}';
  document.head.appendChild(s);
}

const ADMIN_USER = "LUOBO";
const ADMIN_PWD = "tianniWZ1030LJH";

function adminLogin(){
  const u=document.getElementById('adminUser').value.trim();
  const p=document.getElementById('adminPwd').value.trim();
  if(u===ADMIN_USER&&p===ADMIN_PWD){
    localStorage.setItem('adminLogin','true');
    showAdmin();
  }else{alert("ш┤жхП╖цИЦхпЖчаБщФЩшпп");}
}

function showAdmin(){
  document.getElementById('loginBox').style.display="none";
  document.getElementById('adminPanel').style.display="block";
  document.getElementById('logoutBtn').style.display="block";
  loadUserList();
  loadAgentsForAdmin();
  loadCardCount();
  loadPayQr();
}

function adminLogout(){localStorage.removeItem('adminLogin');location.reload();}

function loadUserList(){
  const list=JSON.parse(localStorage.getItem('carrotUsers')||'[]');
  const b=document.getElementById('userList');
  b.innerHTML='';
  list.forEach(u=>{
    let tr=document.createElement('tr');
    tr.innerHTML=`<td>${u.username}</td>`;
    b.appendChild(tr);
  });
}

// ф╗гчРЖчобчРЖ
function addAgent(){
  const name = document.getElementById('agentName').value.trim();
  const qq = document.getElementById('agentQQ').value.trim();
  const level = document.getElementById('agentLevel').value;
  if(!name || !qq){
    showMsg('agentMsg','шп╖хблхЖЩхоМцХ┤','error');
    return;
  }
  const list = JSON.parse(localStorage.getItem('agentList')||'[]');
  list.push({name, qq, level});
  localStorage.setItem('agentList',JSON.stringify(list));
  showMsg('agentMsg','ц╖╗хКацИРхКЯ','success');
  document.getElementById('agentName').value='';
  document.getElementById('agentQQ').value='';
  loadAgentsForAdmin();
}

function deleteAgent(index){
  if(!confirm('чбохоЪхИащЩдшпеф╗гчРЖя╝Я')) return;
  const list = JSON.parse(localStorage.getItem('agentList')||'[]');
  list.splice(index,1);
  localStorage.setItem('agentList',JSON.stringify(list));
  loadAgentsForAdmin();
}

function loadAgentsForAdmin(){
  const list = JSON.parse(localStorage.getItem('agentList')||'[]');
  const box = document.getElementById('agentAdminList');
  box.innerHTML = '';
  list.forEach((a,i)=>{
    const div = document.createElement('div');
    div.style.padding = '4px 0';
    div.style.cursor = 'pointer';
    div.innerText = `${i+1}. ${a.name} | QQ:${a.qq} | ${a.level} [чВ╣хЗ╗хИащЩд]`;
    div.onclick = () => deleteAgent(i);
    box.appendChild(div);
  });
}

// хНбхпЖчобчРЖ
function addCards(){
  const type = document.getElementById('cardType').value;
  const cards = document.getElementById('cardList').value.trim().split('\n').filter(c=>c.trim()!=='');
  if(cards.length === 0) {
    alert('шп╖ш╛УхЕехНбхпЖ');
    return;
  }
  const old = JSON.parse(localStorage.getItem(`card_${type}`)||'[]');
  const newCards = [...old, ...cards];
  localStorage.setItem(`card_${type}`, JSON.stringify(newCards));
  alert(`цИРхКЯц╖╗хКа ${cards.length} ф╕к${type}хНбхпЖ`);
  document.getElementById('cardList').value = '';
  loadCardCount();
}

function loadCardCount(){
  const type = document.getElementById('cardType').value;
  const cards = JSON.parse(localStorage.getItem(`card_${type}`)||'[]');
  document.getElementById('cardCount').innerText = `${type}хЙйф╜ЩхНбхпЖя╝Ъ${cards.length} ф╕к`;
}

// цФ╢цм╛чаБшо╛ч╜о
function savePayQr(){
  const qr = document.getElementById('payQrInput').value.trim();
  localStorage.setItem('payQr', qr);
  loadPayQr();
  alert('цФ╢цм╛чаБх╖▓ф┐ЭхнШ');
}

function loadPayQr(){
  const qr = localStorage.getItem('payQr') || '';
  const preview = document.getElementById('qrPreview');
  if(qr) {
    preview.innerHTML = `<img src="${qr}" alt="цФ╢цм╛чаБ">`;
  } else {
    preview.innerHTML = '<p style="color:var(--light-text);font-size:12px;">цЬкшо╛ч╜оцФ╢цм╛чаБ</p>';
  }
}

function showMsg(id,text,type){
  const m=document.getElementById(id);
  m.innerText=text;
  m.className='msg msg-'+type;
  m.style.display='block';
  setTimeout(()=>m.style.display='none',2000);
}

function saveNotice(){localStorage.setItem('carrotNotice',document.getElementById('noticeText').value);alert("тЬЕ хЕмхСКх╖▓хРМцне");}
function saveApk(){
  const u=document.getElementById('apkUrl').value.trim();
  const n=document.getElementById('apkName').value.trim();
  if(!u||!n){showMsg('apkStatus','шп╖хблхЖЩхоМцХ┤','error');return;}
  localStorage.setItem('apkDownload',JSON.stringify({url:u,name:n}));
  showMsg('apkStatus','тЬЕ х╖▓хРМцнехИ░ф╕╗члЩ','success');
}

window.onload=function(){
  createParticles();
  if(localStorage.getItem('adminLogin')==='true')showAdmin();
}
</script>
</body>
</html>
