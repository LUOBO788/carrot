<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot Admin - 管理后台</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg: #000000;
  --card: #121212;
  --text: #e0e6ff;
  --light-text: #a0b0d0;
  --border: #223;
  --accent: #00ccff;
}

body {
  font-family: 'Segoe UI', Roboto, 'Microsoft YaHei', sans-serif;
  background: linear-gradient(to bottom, #101010, #000);
  color: var(--text);
  line-height: 1.8;
  min-height: 100vh;
  padding-bottom: 40px;
}

.gradient-text {
  font-weight: bold;
  background: linear-gradient(90deg, #00f0ff, #0088ff, #8800ff, #00f0ff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: gradientFlow 6s linear infinite;
}

@keyframes gradientFlow {
  0% { background-position: 0% 50%; }
  100% { background-position: 300% 50%; }
}

.nav {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 999;
}

.logo {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 22px;
}

.logout-btn {
  padding: 6px 12px;
  background: #440000;
  color: #ff6666;
  border: 1px solid #660000;
  border-radius: 6px;
  cursor: pointer;
}

.container {
  max-width: 900px;
  margin: 90px auto 0;
  padding: 0 20px;
}

.login-box {
  max-width: 400px;
  margin: 100px auto;
  background: #151515;
  padding: 30px;
  border-radius: 14px;
  border: 1px solid var(--border);
  text-align: center;
}

.login-box h2 {
  margin-bottom: 20px;
}

.login-box input {
  width: 100%;
  padding: 14px 16px;
  margin-bottom: 14px;
  background: #181818;
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 15px;
  outline: none;
}

.login-box input:focus {
  border-color: #0088ff;
}

.login-btn {
  width: 100%;
  padding: 14px;
  border-radius: 10px;
  background: linear-gradient(90deg, #00f0ff, #0088ff);
  color: #fff;
  font-weight: bold;
  border: none;
  cursor: pointer;
  margin-top: 6px;
}

.admin-section {
  display: none;
}

.section-title {
  font-size: 20px;
  margin: 20px 0;
}

.card {
  background: #151515;
  border-radius: 12px;
  padding: 20px;
  margin-bottom: 20px;
  border: 1px var(--border);
}

.card h3 {
  margin-bottom: 15px;
  font-size: 16px;
}

.user-table {
  width: 100%;
  border-collapse: collapse;
}

.user-table th, .user-table td {
  padding: 10px;
  text-align: left;
  border-bottom: 1px solid var(--border);
  font-size: 14px;
}

.notice-input {
  width: 100%;
  padding: 12px;
  background: #181818;
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  margin-bottom: 10px;
  min-height: 80px;
  resize: none;
}

.save-btn {
  padding: 8px 16px;
  background: #004422;
  color: #00ff88;
  border: 1px solid #006633;
  border-radius: 6px;
  cursor: pointer;
}

.msg {
  padding: 10px;
  border-radius: 6px;
  margin-bottom: 10px;
  text-align: center;
  display: none;
}

.msg-success {
  background: #004422;
  color: #00ff88;
}

.msg-error {
  background: #440000;
  color: #ff6666;
}
</style>
</head>

<body>

<div class="nav">
  <div class="logo gradient-text">🥕 Carrot 管理后台</div>
  <button class="logout-btn" onclick="adminLogout()" style="display:none;" id="logoutBtn">退出登录</button>
</div>

<div class="container">
  <div class="login-box" id="loginBox">
    <h2 class="gradient-text">管理员登录</h2>
    <div id="msg" class="msg"></div>
    <input type="text" id="adminUser" placeholder="管理员账号">
    <input type="password" id="adminPwd" placeholder="管理员密码">
    <button class="login-btn" onclick="adminLogin()">立即登录</button>
  </div>

  <div class="admin-section" id="adminPanel">
    <h2 class="section-title gradient-text">控制面板</h2>

    <div class="card">
      <h3 class="gradient-text">用户列表</h3>
      <table class="user-table">
        <thead>
          <tr>
            <th>用户名</th>
            <th>会员等级</th>
            <th>到期时间</th>
          </tr>
        </thead>
        <tbody id="userList"></tbody>
      </table>
    </div>

    <div class="card">
      <h3 class="gradient-text">首页公告管理</h3>
      <textarea class="notice-input" id="noticeText" placeholder="输入公告内容，将同步到主站"></textarea>
      <button class="save-btn" onclick="saveNotice()">保存公告</button>
    </div>

    <div class="card">
      <h3 class="gradient-text">📦 APK 下载设置（秒上传不卡顿）</h3>
      <input type="text" id="apkUrl" placeholder="输入 APK 下载链接" style="width:100%;padding:12px;background:#181818;border:1px solid #223;border-radius:8px;color:#fff;margin-bottom:10px;">
      <input type="text" id="apkName" placeholder="输入版本名 如 v1.2.0" style="width:100%;padding:12px;background:#181818;border:1px solid #223;border-radius:8px;color:#fff;margin-bottom:10px;">
      <button class="save-btn" onclick="saveApk()">保存并同步到主站</button>
      <div id="apkStatus" class="msg"></div>
      <div id="currentApk" style="margin-top:12px;padding:10px;background:#181818;border-radius:6px;"></div>
    </div>

    <div class="card">
      <h3 class="gradient-text">系统信息</h3>
      <p>当前版本：v1.2.0</p>
      <p>配套主站：Carrot 辅助官网</p>
      <p>管理权限：最高管理员</p>
      <p>管理模式：前端本地管理</p>
    </div>
  </div>
</div>

<script>
const ADMIN_USER = "LUOBO";
const ADMIN_PWD = "tianniWZ1030LJH";

function adminLogin() {
  const user = document.getElementById('adminUser').value.trim();
  const pwd = document.getElementById('adminPwd').value.trim();
  const msg = document.getElementById('msg');

  if(user === ADMIN_USER && pwd === ADMIN_PWD) {
    localStorage.setItem('adminLogin', 'true');
    showAdmin();
  } else {
    msg.innerText = "❌ 账号或密码错误";
    msg.className = "msg msg-error";
    msg.style.display = "block";
  }
}

function showAdmin() {
  document.getElementById('loginBox').style.display = "none";
  document.getElementById('adminPanel').style.display = "block";
  document.getElementById('logoutBtn').style.display = "block";
  loadUserList();
  loadNotice();
  showCurrentApk();
}

function adminLogout() {
  localStorage.removeItem('adminLogin');
  location.reload();
}

function loadUserList() {
  const userList = JSON.parse(localStorage.getItem('carrotUsers') || '[]');
  const tbody = document.getElementById('userList');
  tbody.innerHTML = "";
  userList.forEach(u => {
    let tr = document.createElement('tr');
    tr.innerHTML = `<td>${u.username}</td><td>普通用户</td><td>未开通</td>`;
    tbody.appendChild(tr);
  });
}

function loadNotice() {
  const notice = localStorage.getItem('carrotNotice') || "📢 v1.2.0 版本已更新\n📢 祝各位用户使用愉快";
  document.getElementById('noticeText').value = notice;
}

function saveNotice() {
  const text = document.getElementById('noticeText').value.trim();
  localStorage.setItem('carrotNotice', text);
  alert("✅ 公告已同步到主站！");
}

function saveApk() {
  const url = document.getElementById('apkUrl').value.trim();
  const name = document.getElementById('apkName').value.trim();
  if(!url || !name) {
    const s = document.getElementById('apkStatus');
    s.innerText = "❌ 请填写完整";
    s.className = "msg msg-error";
    s.style.display = "block";
    return;
  }
  localStorage.setItem('apkDownload', JSON.stringify({url,name}));
  const s = document.getElementById('apkStatus');
  s.innerText = "✅ 已同步主站下载！";
  s.className = "msg msg-success";
  s.style.display = "block";
  showCurrentApk();
}

function showCurrentApk() {
  const d = document.getElementById('currentApk');
  const a = localStorage.getItem('apkDownload');
  if(!a) { d.innerText = "当前未设置下载"; return; }
  const j = JSON.parse(a);
  d.innerText = `版本：${j.name} ｜ 已同步`;
}

window.onload = function() {
  if(localStorage.getItem('adminLogin') === 'true') showAdmin();
}
</script>
</body>
</html>
