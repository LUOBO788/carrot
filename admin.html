<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#050507;--card:#12151d;--text:#e0e6ff;--light-text:#aaa;
  --border:#252a33;--blue:#00d1ff;--purple:#9d00ff;--pink:#ff00d1;
}
body{background:#050507;color:var(--text);font-family:Segoe UI,Microsoft YaHei,sans-serif;}
.nav{
  position:fixed;top:0;left:0;width:100%;
  background:rgba(10,12,18,0.9);backdrop-filter:blur(12px);
  padding:16px;display:flex;justify-content:space-between;align-items:center;z-index:99;
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.logo{
  background:linear-gradient(90deg,#00d1ff,#9d00ff,#ff00d1);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  font-weight:bold;font-size:18px;
}
.btn{
  background:linear-gradient(90deg,var(--blue),var(--purple));
  color:#fff;border:none;border-radius:12px;padding:10px 14px;
  cursor:pointer;margin:4px;
}
.btn-danger{background:rgba(255,64,124,.2);color:#ff407c;}
.btn-tab{background:#222;color:#fff;border:1px solid #333;}
.btn-tab.active{background:linear-gradient(90deg,var(--blue),var(--purple));border-color:transparent;}
.container{max-width:600px;margin:80px auto;padding:20px;}
.card{
  background:var(--card);border-radius:16px;padding:20px;
  margin-bottom:16px;border:1px solid var(--border);
}
.card h3{margin-bottom:12px;color:var(--text);}
input,textarea,select{
  width:100%;background:rgba(255,255,255,.05);
  border:1px solid var(--border);border-radius:12px;
  padding:12px;margin:6px 0;color:#fff;outline:none;
}
.upload{
  border:2px dashed #555;border-radius:12px;
  padding:18px;text-align:center;cursor:pointer;margin:10px 0;
}
.order{
  background:#151515;border-radius:12px;padding:14px;margin-bottom:10px;
}
.order img{max-width:140px;border-radius:8px;margin:8px 0;}
.title{font-size:14px;color:#ccc;}
#qrPrev{max-width:180px;border-radius:12px;margin:10px 0;display:none;}
.agent-item{
  padding:8px 0;cursor:pointer;color:#eee;
}
.order-tabs{
  display:flex;gap:8px;margin-bottom:12px;
}
.current-apk{
  background:rgba(255,255,255,0.03);border-radius:12px;padding:12px;
  margin-top:10px;font-size:13px;color:var(--light-text);
}
.msg{padding:10px;border-radius:10px;margin:10px 0;text-align:center;display:none;}
.msg-success{background:rgba(0,255,136,0.08);color:#00ff88;}
</style>
</head>
<body>

<div class="nav">
  <div class="logo">🥕 Carrot 管理后台</div>
  <button class="btn" onclick="logout()">退出登录</button>
</div>

<div class="container" id="admin" style="display:none;">

  <!-- 公告设置 -->
  <div class="card">
    <h3 class="gradient-text">网站公告</h3>
    <textarea id="noticeContent" rows="3" placeholder="输入公告内容，用户首页会显示"></textarea>
    <button class="btn" onclick="saveNotice()">保存公告</button>
  </div>

  <!-- 收款码设置 -->
  <div class="card">
    <h3 class="gradient-text">收款码设置</h3>
    <div class="upload" onclick="document.getElementById('qr').click()">点击上传收款码</div>
    <input type="file" id="qr" accept="image/*" style="display:none;">
    <img id="qrPrev">
    <button class="btn" onclick="saveQr()">保存收款码</button>
  </div>

  <!-- 卡密管理 -->
  <div class="card">
    <h3 class="gradient-text">卡密管理</h3>
    <select id="ctype">
      <option value="周卡">周卡</option>
      <option value="月卡">月卡</option>
      <option value="季卡">季卡</option>
      <option value="永久">永久</option>
    </select>
    <textarea id="cards" rows="4" placeholder="一行一个卡密"></textarea>
    <button class="btn" onclick="addCards()">添加卡密</button>
    <div id="cardCount" style="margin-top:8px;"></div>
  </div>

  <!-- 代理管理 -->
  <div class="card">
    <h3 class="gradient-text">代理管理</h3>
    <input id="an" placeholder="代理名称">
    <input id="aq" placeholder="QQ号">
    <select id="al">
      <option value="总代理">总代理</option>
      <option value="代理">代理</option>
    </select>
    <button class="btn" onclick="addAgent()">添加代理</button>
    <div id="agentList" style="margin-top:14px;"></div>
  </div>

  <!-- APK下载设置 -->
  <div class="card">
    <h3 class="gradient-text">APK 下载设置</h3>
    <input type="text" id="apkUrl" placeholder="APK 下载链接">
    <input type="text" id="apkName" placeholder="版本名（如 v1.2.0）">
    <button class="btn" onclick="saveApk()">保存并同步到主站</button>
    <div id="apkMsg" class="msg"></div>
    <div id="currentApk" class="current-apk"></div>
  </div>

  <!-- 订单管理 -->
  <div class="card">
    <h3 class="gradient-text">订单管理</h3>
    <div class="order-tabs">
      <button class="btn btn-tab active" onclick="loadOrderTab('pending')">待审核</button>
      <button class="btn btn-tab" onclick="loadOrderTab('success')">已完成</button>
      <button class="btn btn-tab" onclick="loadOrderTab('reject')">已拒绝</button>
    </div>
    <div id="orderList"></div>
  </div>
</div>

<!-- 登录 -->
<div class="container" id="login">
  <div class="card">
    <h3 class="gradient-text">管理员登录</h3>
    <input id="user" placeholder="账号">
    <input id="pwd" type="password" placeholder="密码">
    <button class="btn" onclick="login()">登录</button>
  </div>
</div>

<script>
const ADMIN_USER = "LUOBO";
const ADMIN_PWD = "tianniWZ1030LJH";
let currentOrderTab = 'pending';

// 登录
function login(){
  const u = document.getElementById('user').value;
  const p = document.getElementById('pwd').value;
  if(u === ADMIN_USER && p === ADMIN_PWD){
    localStorage.setItem('admin','ok');
    location.reload();
  }else{alert('账号或密码错误');}
}

function logout(){
  localStorage.removeItem('admin');
  location.reload();
}

// 公告
function saveNotice(){
  const c = document.getElementById('noticeContent').value.trim();
  localStorage.setItem('siteNotice',c);
  alert('✅ 公告保存成功');
}

// 收款码
let tmpQr = '';
document.getElementById('qr').addEventListener('change',e=>{
  const f = e.target.files[0];if(!f) return;
  const r = new FileReader();
  r.onload = ev=>{
    tmpQr = ev.target.result;
    document.getElementById('qrPrev').src = tmpQr;
    document.getElementById('qrPrev').style.display = 'block';
  };
  r.readAsDataURL(f);
});
function saveQr(){
  if(!tmpQr){alert('请上传收款码');return;}
  localStorage.setItem('payQr',tmpQr);
  alert('✅ 收款码保存成功');
}

// 卡密
function addCards(){
  const t = document.getElementById('ctype').value;
  const cs = document.getElementById('cards').value.trim().split('\n').filter(x=>x);
  const old = JSON.parse(localStorage.getItem('card_'+t)||'[]');
  localStorage.setItem('card_'+t,JSON.stringify([...old,...cs]));
  alert('✅ 卡密添加成功');
  document.getElementById('cards').value = '';
  loadCardCount();
}
function loadCardCount(){
  const t = document.getElementById('ctype').value;
  const c = JSON.parse(localStorage.getItem('card_'+t)||'[]').length;
  document.getElementById('cardCount').innerText = `📦 ${type} 库存：${c} 个`;
}

// 代理
function addAgent(){
  const n = document.getElementById('an').value.trim();
  const q = document.getElementById('aq').value.trim();
  const l = document.getElementById('al').value;
  if(!n||!q){alert('请完整填写');return;}
  const a = JSON.parse(localStorage.getItem('agentList')||'[]');
  a.push({name:n,qq:q,level:l});
  localStorage.setItem('agentList',JSON.stringify(a));
  document.getElementById('an').value='';document.getElementById('aq').value='';
  loadAgents();
}
function deleteAgent(i){
  if(!confirm('确定删除该代理？')) return;
  const a = JSON.parse(localStorage.getItem('agentList')||'[]');
  a.splice(i,1);
  localStorage.setItem('agentList',JSON.stringify(a));
  loadAgents();
}
function loadAgents(){
  const a = JSON.parse(localStorage.getItem('agentList')||'[]');
  const b = document.getElementById('agentList');
  b.innerHTML = '';
  a.forEach((it,i)=>{
    const d = document.createElement('div');
    d.className = 'agent-item';
    d.innerText = `${i+1}. ${it.name} | QQ:${it.qq} | ${it.level} [点击删除]`;
    d.onclick = ()=>deleteAgent(i);
    b.appendChild(d);
  });
}

// APK下载设置
function saveApk(){
  const u = document.getElementById('apkUrl').value.trim();
  const n = document.getElementById('apkName').value.trim();
  if(!u||!n){alert('请填写完整');return;}
  localStorage.setItem('apkDownload',JSON.stringify({url:u,name:n}));
  
  const m = document.getElementById('apkMsg');
  m.innerText = '✅ 已同步到主站下载按钮';
  m.className = 'msg msg-success';
  m.style.display = 'block';
  setTimeout(()=>m.style.display='none',2000);
  
  showCurrentApk();
}
function showCurrentApk(){
  const apk = localStorage.getItem('apkDownload');
  if(apk){
    const d = JSON.parse(apk);
    document.getElementById('currentApk').innerText = `当前版本：${d.name} | 下载链接：${d.url}`;
  }
}

// 订单
function loadOrderTab(type){
  currentOrderTab = type;
  document.querySelectorAll('.btn-tab').forEach(t=>t.classList.remove('active'));
  event.target.classList.add('active');
  loadOrders();
}

function loadOrders(){
  const os = JSON.parse(localStorage.getItem('orders')||'[]');
  const b = document.getElementById('orderList');
  b.innerHTML = '';
  os.filter(o=>o.status===currentOrderTab).forEach(o=>{
    const d = document.createElement('div');
    d.className = 'order';
    let btnHtml = '';
    if(o.status === 'pending'){
      btnHtml = `
        <button class="btn" onclick="pass(${o.id})">通过并发卡</button>
        <button class="btn btn-danger" onclick="reject(${o.id})">拒绝</button>
      `;
    } else if(o.status === 'success'){
      btnHtml = `<div style="color:#00ff88">✅ 已发卡：${o.card}</div>`;
    } else {
      btnHtml = `<div style="color:#ff407c">❌ 已拒绝</div>`;
    }
    d.innerHTML = `
      <div class="title">用户：${o.user}</div>
      <div>套餐：${o.type}  ¥${o.price}</div>
      <div>尾号：${o.trail}</div>
      <img src="${o.ss}">
      ${btnHtml}
    `;
    b.appendChild(d);
  });
}

// 审核
function pass(oid){
  const os = JSON.parse(localStorage.getItem('orders')||'[]');
  const idx = os.findIndex(x=>x.id===oid);
  if(idx===-1)return;
  const o = os[idx];
  const key = 'card_'+o.type;
  const cards = JSON.parse(localStorage.getItem(key)||'[]');
  if(cards.length===0){alert('❌ 卡密不足');return;}
  const card = cards.shift();
  localStorage.setItem(key,JSON.stringify(cards));
  os[idx].status = 'success';
  os[idx].card = card;
  localStorage.setItem('orders',JSON.stringify(os));
  alert('✅ 审核成功！卡密：'+card);
  loadOrders();
  loadCardCount();
}

function reject(oid){
  const os = JSON.parse(localStorage.getItem('orders')||'[]');
  const idx = os.findIndex(x=>x.id===oid);
  os[idx].status = 'reject';
  localStorage.setItem('orders',JSON.stringify(os));
  alert('❌ 已拒绝');
  loadOrders();
}

// 初始化
window.onload = function(){
  if(localStorage.getItem('admin')==='ok'){
    document.getElementById('login').style.display = 'none';
    document.getElementById('admin').style.display = 'block';
    document.getElementById('noticeContent').value = localStorage.getItem('siteNotice') || '';
    loadCardCount();
    loadAgents();
    showCurrentApk();
    loadOrders();
  }
};
</script>
</body>
</html>
