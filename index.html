<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carrot - 科技辅助系统</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
:root {
  --bg: #050507;
  --card: #12151d;
  --text: #e0e6ff;
  --light-text: #a0b0d7;
  --border: #252a33;
  --blue: #00d1ff;
  --purple: #9d00ff;
  --pink: #ff00d1;
  --glow: 0 0 12px rgba(0,209,255,0.2);
}
#particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}
body {
  background: #050507;
  color: var(--text);
  font-family: 'Segoe UI','Microsoft YaHei',sans-serif;
  line-height: 1.6;
  min-height: 100vh;
  padding-bottom: 60px;
}
.gradient-text {
  background: linear-gradient(90deg,var(--blue),var(--purple),var(--pink));
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  animation: flow 4s linear infinite;
  background-size: 250% 100%;
}
@keyframes flow{
  0%{background-position:0% 50%;}
  100%{background-position:250% 50%;}
}
.nav{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(10,12,18,0.85);
  backdrop-filter: blur(12px);
  padding: 16px;
  text-align: center;
  z-index: 99;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.logo{
  font-size: 22px;
  font-weight: bold;
}
.hero{
  padding: 100px 20px 30px;
  text-align: center;
}
.hero h1{
  margin-bottom: 10px;
}
.hero p{
  color: var(--light-text);
}
#notice-box{
  max-width: 420px;
  margin: 20px auto;
  padding: 14px 20px;
  background: rgba(0,209,255,0.08);
  border: 1px solid rgba(0,209,255,0.2);
  border-radius: 14px;
  text-align: center;
  color: #00d1ff;
  font-weight: 500;
  display: none;
}
.user-center{
  max-width: 420px;
  margin: 0 auto;
  padding: 20px;
}
.user-tabs{
  display: flex;
  border-radius: 14px;
  overflow: hidden;
  background: rgba(18,20,28,0.6);
  margin-bottom: 20px;
}
.user-tab{
  flex: 1;
  padding: 14px;
  text-align: center;
  cursor: pointer;
  font-weight: 600;
}
.user-tab.active{
  background: linear-gradient(90deg,var(--blue),var(--purple));
}
.user-form{
  display: none;
}
.user-form.active{
  display: block;
}
input{
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  color: #fff;
  outline: none;
}
.submit-btn{
  width: 100%;
  background: linear-gradient(90deg,var(--blue),var(--purple));
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 14px;
  font-weight: bold;
  cursor: pointer;
}
.user-page{
  display: none;
}
.user-card{
  background: var(--card);
  border-radius: 18px;
  padding: 24px;
  text-align: center;
  margin-bottom: 20px;
  border: 1px solid var(--border);
}
.user-btns{
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.user-btns button{
  flex: 1;
}
.btn-exit{
  background: rgba(255,64,124,0.1) !important;
  color: #ff407c !important;
}
.price-cards{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin: 20px 0;
}
.price-card{
  background: var(--card);
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  cursor: pointer;
  border: 1px solid var(--border);
  transition: 0.3s;
}
.price-card:hover{
  transform: translateY(-3px);
  border-color: var(--blue);
}
.price{
  font-size: 18px;
  color: var(--blue);
  font-weight: bold;
  margin-top: 6px;
}
.btn{
  background: linear-gradient(90deg,var(--blue),var(--purple));
  color: #fff;
  border: none;
  border-radius: 12px;
  padding: 14px;
  font-weight: bold;
  cursor: pointer;
  margin-top: 6px;
}
.modal{
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.85);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}
.modal-box{
  background: #12151d;
  border-radius: 20px;
  padding: 28px;
  max-width: 380px;
  width: 90%;
  text-align: center;
}
.modal-box img{
  max-width: 220px;
  margin: 10px auto;
  border-radius: 12px;
}
.upload-area{
  border: 2px dashed #555;
  border-radius: 12px;
  padding: 20px;
  margin: 12px 0;
  cursor: pointer;
}
.upload-area:hover{
  border-color: var(--blue);
}
#screenshot{
  display: none;
}
.agent-list{
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 20px 0;
}
.agent-item{
  background: var(--card);
  border-radius: 14px;
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.agent-avatar{
  width: 46px;
  height: 46px;
  border-radius: 50%;
  background: #222;
}
</style>
</head>
<body>

<div id="particles"></div>
<div class="nav">
  <div class="logo gradient-text">🥕 Carrot 科技辅助系统</div>
</div>

<div class="hero">
  <h1 class="gradient-text">让生存更简单</h1>
  <p>稳定 | 高效 | 安全 | 持续更新</p>
</div>

<div id="notice-box">
  📢 公告：<span id="notice-text"></span>
</div>

<div class="user-center">
  <div class="user-tabs">
    <div class="user-tab active" onclick="switchTab('login')">登录</div>
    <div class="user-tab" onclick="switchTab('reg')">注册</div>
  </div>

  <div class="user-form active" id="login-form">
    <input id="login-user" placeholder="用户名">
    <input id="login-pwd" type="password" placeholder="密码">
    <button class="submit-btn" onclick="userLogin()">登录</button>
  </div>

  <div class="user-form" id="reg-form">
    <input id="reg-user" placeholder="用户名">
    <input id="reg-pwd" type="password" placeholder="密码">
    <input id="reg-pwd2" type="password" placeholder="确认密码">
    <button class="submit-btn" onclick="userRegister()">注册</button>
  </div>

  <div class="user-page" id="user-page">
    <div class="user-card">
      <div class="gradient-text" id="show-name" style="font-size:20px"></div>
      <div style="margin-top:8px;color:#aaa">用户中心</div>
    </div>

    <div class="user-btns">
      <button class="btn" onclick="logout()">退出登录</button>
    </div>

    <div class="price-cards">
      <div class="price-card" onclick="openBuy('周卡',12)">
        <h4>周卡</h4><div class="price">¥12</div>
      </div>
      <div class="price-card" onclick="openBuy('月卡',25)">
        <h4>月卡</h4><div class="price">¥25</div>
      </div>
      <div class="price-card" onclick="openBuy('季卡',36)">
        <h4>季卡</h4><div class="price">¥36</div>
      </div>
      <div class="price-card" onclick="openBuy('永久',65)">
        <h4>永久</h4><div class="price">¥65</div>
      </div>
    </div>

    <div class="agent-list" id="agentList"></div>
  </div>
</div>

<div class="modal" id="buyModal">
  <div class="modal-box">
    <h3 class="gradient-text">提交订单</h3>
    <img id="payQrShow" style="display:none;">
    <p>套餐：<span id="showType"></span></p>
    <p>金额：<span id="showPrice" style="color:var(--blue);font-weight:bold;"></span> 元</p>
    <input type="text" id="order_user" placeholder="输入用户名核对">
    <input type="text" id="order_trail" placeholder="支付尾号（如 88）">
    <label class="upload-area" onclick="document.getElementById('screenshot').click()">
      <p>点击上传支付成功截图</p>
    </label>
    <input type="file" id="screenshot" accept="image/*">
    <button class="btn" onclick="submitOrder()">提交订单（等待审核）</button>
    <button class="btn btn-exit" onclick="closeModal()">取消</button>
  </div>
</div>

<script>
let currentType = '';
let currentPrice = 0;
let screenShot = '';
let loginUser = '';

function createParticles(){
  const p = document.getElementById('particles');
  for(let i=0;i<50;i++){
    let d = document.createElement('div');
    d.style.cssText = `
      position:absolute;
      width:${Math.random()*3+1}px;
      height:${Math.random()*3+1}px;
      background:#00d1ff;
      border-radius:50%;
      top:${Math.random()*100}%;
      left:${Math.random()*100}%;
      opacity:0.4;
    `;
    p.appendChild(d);
  }
}

function switchTab(t){
  document.querySelectorAll('.user-tab').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.user-form').forEach(e=>e.classList.remove('active'));
  if(t === 'login'){
    document.getElementById('login-form').classList.add('active');
    document.querySelectorAll('.user-tab')[0].classList.add('active');
  }else{
    document.getElementById('reg-form').classList.add('active');
    document.querySelectorAll('.user-tab')[1].classList.add('active');
  }
}

function userRegister(){
  const u = document.getElementById('reg-user').value.trim();
  const p = document.getElementById('reg-pwd').value.trim();
  const p2 = document.getElementById('reg-pwd2').value.trim();
  if(!u || !p || p !== p2){
    alert('请正确填写信息');
    return;
  }
  let users = JSON.parse(localStorage.getItem('carrotUsers') || '[]');
  if(users.some(item => item.user === u)){
    alert('用户名已存在');
    return;
  }
  users.push({ user: u, pwd: p });
  localStorage.setItem('carrotUsers', JSON.stringify(users));
  alert('注册成功，请登录');
  switchTab('login');
}

function userLogin(){
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pwd').value.trim();
  let users = JSON.parse(localStorage.getItem('carrotUsers') || '[]');
  let find = users.find(item => item.user === u && item.pwd === p);
  if(!find){
    alert('账号或密码错误');
    return;
  }
  loginUser = u;
  localStorage.setItem('loginUser', u);
  showUserPage();
}

function showUserPage(){
  document.querySelector('.user-tabs').style.display = 'none';
  document.getElementById('login-form').classList.remove('active');
  document.getElementById('reg-form').classList.remove('active');
  document.getElementById('user-page').style.display = 'block';
  document.getElementById('show-name').innerText = loginUser;
}

function logout(){
  localStorage.removeItem('loginUser');
  location.reload();
}

function openBuy(type,price){
  if(!loginUser){
    alert('请先登录');
    return;
  }
  currentType = type;
  currentPrice = price;
  document.getElementById('showType').innerText = type;
  document.getElementById('showPrice').innerText = price;
  document.getElementById('order_user').value = loginUser;
  const qr = localStorage.getItem('payQr');
  if(qr){
    document.getElementById('payQrShow').src = qr;
    document.getElementById('payQrShow').style.display = 'block';
  }
  document.getElementById('buyModal').style.display = 'flex';
}

function closeModal(){
  document.getElementById('buyModal').style.display = 'none';
}

document.getElementById('screenshot').addEventListener('change',function(e){
  const f = e.target.files[0];
  if(!f) return;
  const r = new FileReader();
  r.onload = ev => {
    screenShot = ev.target.result;
  };
  r.readAsDataURL(f);
});

function submitOrder(){
  const u = document.getElementById('order_user').value.trim();
  const t = document.getElementById('order_trail').value.trim();
  if(!u || !t || !screenShot || !currentType){
    alert('请完成所有信息');
    return;
  }
  let orders = JSON.parse(localStorage.getItem('orders') || '[]');
  orders.push({
    id: Date.now(),
    user: u,
    type: currentType,
    price: currentPrice,
    trail: t,
    ss: screenShot,
    status: 'pending'
  });
  localStorage.setItem('orders',JSON.stringify(orders));
  alert('订单提交成功！管理员审核后自动发卡。');
  closeModal();
}

function loadAgents(){
  const list = JSON.parse(localStorage.getItem('agentList') || '[]');
  const box = document.getElementById('agentList');
  box.innerHTML = '';
  list.forEach(a=>{
    const item = document.createElement('div');
    item.className = 'agent-item';
    item.innerHTML = `
      <img class="agent-avatar" src="https://q1.qlogo.cn/g?b=qq&nk=${a.qq}&s=640">
      <div>
        <div>${a.name}</div>
        <div style="font-size:12px;color:#aaa">${a.level}</div>
      </div>
    `;
    box.appendChild(item);
  });
}

window.onload = function(){
  createParticles();
  loadAgents();

  const notice = localStorage.getItem('siteNotice');
  if(notice && notice.trim()){
    document.getElementById('notice-text').innerText = notice;
    document.getElementById('notice-box').style.display = 'block';
  }

  const lu = localStorage.getItem('loginUser');
  if(lu){
    loginUser = lu;
    showUserPage();
  }
};
</script>
</body>
</html>
